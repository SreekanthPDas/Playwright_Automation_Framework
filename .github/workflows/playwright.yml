name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      CI: true
      ENV: QA

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🐳 Build Docker image
      - name: Build Docker image
        run: docker build -t playwright-tests .

      # 🧪 Run tests inside Docker
      - name: Run Playwright tests in Docker
        run: |
          docker run --name pw-container \
            -e CI=true \
            -e ENV=QA \
            -e BASE_URL=https://opensource-demo.orangehrmlive.com \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            playwright-tests

      # 🔍 Debug
      - name: Debug generated files
        if: always()
        run: |
          echo "==== PLAYWRIGHT REPORT ===="
          ls -R playwright-report || echo "No playwright-report found"

          echo "==== TEST RESULTS ===="
          ls -R test-results || echo "No test-results found"

          echo "==== ALLURE RESULTS ===="
          ls -R allure-results || echo "No allure-results found"

      # 📦 Install Allure CLI
      - name: Install Allure CLI
        if: always()
        run: npm install --no-save allure-commandline

      # 📊 Generate Allure Report
      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "No Allure results found, skipping report generation"
          fi

      # 📊 Upload Playwright HTML report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      # 📁 Upload traces/videos/screenshots
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

      # 📊 Upload Allure report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: ignore

      # 📦 Prepare Allure report for GitHub Pages
      - name: Prepare Allure Report for Pages
        if: always()
        run: |
          mkdir -p public
          cp -r allure-report/* public/

      # 🚀 Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public