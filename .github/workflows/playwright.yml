name: Playwright Tests

on:
  pull_request:
    branches: [ main, master ]

  push:
    branches: [ main, master ]

  schedule:
    - cron: '0 2 * * *'   # Nightly regression

  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'DEV'
        type: choice
        options:
          - DEV
          - SQA1
          - SQA2

      suite:
        description: 'Select Test Suite'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - full

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🧠 Decide ENV + SUITE dynamically
      - name: Set execution parameters
        run: |
          echo "EVENT: ${{ github.event_name }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ENV=DEV" >> $GITHUB_ENV
            echo "TEST_ARGS=--grep @smoke" >> $GITHUB_ENV
            echo "Running SMOKE on DEV"

          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "ENV=SQA1" >> $GITHUB_ENV
            echo "TEST_ARGS=--grep @regression" >> $GITHUB_ENV
            echo "Running REGRESSION on SQA1"

          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV

            if [[ "${{ github.event.inputs.suite }}" == "smoke" ]]; then
              echo "TEST_ARGS=--grep @smoke" >> $GITHUB_ENV
            elif [[ "${{ github.event.inputs.suite }}" == "regression" ]]; then
              echo "TEST_ARGS=--grep @regression" >> $GITHUB_ENV
            else
              echo "TEST_ARGS=" >> $GITHUB_ENV
            fi

            echo "Manual run → ENV=${{ github.event.inputs.environment }}"

          else
            echo "ENV=DEV" >> $GITHUB_ENV
            echo "TEST_ARGS=" >> $GITHUB_ENV
            echo "Push to main → running FULL suite on DEV"
          fi

      # 🐳 Build Docker image
      - name: Build Docker image
        run: docker build -t playwright-tests .

      # 🧪 Run tests in Docker
      - name: Run Playwright tests in Docker
        run: |
          docker run --name pw-container \
            -e CI=true \
            -e ENV=${{ env.ENV }} \
            -e TEST_ARGS="${{ env.TEST_ARGS }}" \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            playwright-tests

      # 🔍 Debug outputs
      - name: Debug generated files
        if: always()
        run: |
          echo "==== ENV ===="
          echo $ENV

          echo "==== ALLURE RESULTS ===="
          ls -R allure-results || echo "No allure-results found"

      # 📦 Install Allure CLI
      - name: Install Allure CLI
        if: always()
        run: npm install --no-save allure-commandline

      # 📊 Generate Allure Report
      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "No Allure results found"
          fi

      # 📊 Upload Allure Report artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: ignore

      # 📦 Upload artifact for GitHub Pages
      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4