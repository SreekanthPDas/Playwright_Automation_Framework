name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      CI: true
      ENV: QA

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🐳 Build Docker image
      - name: Build Docker image
        run: docker build -t playwright-tests .

      # 🧪 Run tests inside Docker
      - name: Run Playwright tests in Docker
        run: |
          docker run --name pw-container \
            -e CI=true \
            -e ENV=QA \
            -e BASE_URL=https://opensource-demo.orangehrmlive.com \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            playwright-tests

      # ✅ (NEW) Generate Allure report
      - name: Generate Allure Report
        run: |
          npx allure generate allure-results --clean -o allure-report

      # 📊 Upload HTML report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 📁 Upload traces/videos/screenshots
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      # ✅ (NEW) Upload Allure report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/